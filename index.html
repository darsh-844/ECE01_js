<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body onload="myFunction()">
    <button onclick="onClick()">onclick</button>
    <br><hr><br>
    <button onmouseover="onMouseOver()">onmouseover</button>
    <br><hr><br>
    <button onmouseout="onMouseOut()">onmouseout</button>
    <br><hr><br>
    <button onmousemove="onMouseMove()">onmousemove</button>
    <br><hr><br> 
    <button onmousedown="onMouseDown()">onmousedown</button>
    <br><hr><br>
    <button onmouseup="onMouseUp()">onmouseup</button>
    <br><hr><br>
    <button ondblclick="onDblClick()">ondblclick</button>
    <br><hr><br>
    <button onkeydown="onKeyDown()">onkeydown</button>
    <br><hr><br>
    <button onkeypress="onKeyPress()">onkeypress</button>   
    <br><hr><br>
    <button onkeyup="onKeyUp()">onkeyup</button>
    <br><hr><br>
    <script src="./script.js"></script>
</body>
</html>
